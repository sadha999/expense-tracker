{% extends 'base.html' %}
{% block content %}

<h2>Edit Expense</h2>

<form method="POST">
    <input type="text" name="title" value="{{ expense[1] }}" required><br><br>
    <input type="number" step="0.01" name="amount" value="{{ expense[2] }}" required><br><br>
    <input type="text" name="category" value="{{ expense[3] }}" required><br><br>
    <button type="submit">Update Expense</button>
</form>

{% endblock %}
